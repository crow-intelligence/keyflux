site_name: keyflux
site_description: Corpus keyness, rank-turbulence divergence, and allotaxonographs
site_url: https://keyflux.readthedocs.io
repo_url: https://github.com/crow-intelligence/keyflux
repo_name: crow-intelligence/keyflux

# Fail the build on any warning (broken links, missing autodoc targets, dead
# snippet paths). Keeps the published docs honest.
strict: true

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://crowintelligence.org/
      name: Crow Intelligence

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  # Pull the verified example scripts into the docs so they never drift.
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true

nav:
  - Getting Started:
      - index.md
      - quickstart.md
  - Tutorials:
      - tutorials/keyness_walkthrough.md
      - tutorials/rtd_allotaxonograph.md
      - tutorials/two_views.md
  - Examples:
      - examples/keyness_quickstart.md
      - examples/allotaxonograph_demo.md
  - Troubleshooting: troubleshooting.md
  - API Reference:
      - api/measures.md
      - api/keyness.md
      - api/classify.md
      - api/rankedlist.md
      - api/rtd.md
      - api/allotaxonograph.md
      - api/corpus.md
      - api/datasets.md
