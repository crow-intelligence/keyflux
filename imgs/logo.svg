<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 150" width="550" height="150" style="background-color: #1A1B20;">
  <defs>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <g id="flux-paths" fill="none" stroke-linecap="round">
      <path d="M 50,40 C 90,40 90,110 130,110" stroke="#06B6D4" /> <path d="M 50,75 C 90,75 90,40 130,40" stroke="#D946EF" /> <path d="M 50,110 C 90,110 90,75 130,75" stroke="#F59E0B" /> </g>
  </defs>

  <use href="#flux-paths" stroke-width="12" filter="url(#neonGlow)" opacity="0.9" />
  
  <use href="#flux-paths" stroke-width="12" />

  <use href="#flux-paths" stroke="#1A1B20" stroke-width="3.5" />

  <g fill="#FFFFFF">
    <circle cx="50" cy="40" r="3" />
    <circle cx="50" cy="75" r="3" />
    <circle cx="50" cy="110" r="3" />
    
    <circle cx="130" cy="40" r="3" />
    <circle cx="130" cy="75" r="3" />
    <circle cx="130" cy="110" r="3" />
  </g>

  <text x="170" y="85" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ECF0F1" letter-spacing="-1">keyflux</text>
  
  <text x="173" y="110" font-family="'Courier New', Courier, monospace" font-size="14" font-weight="600" fill="#94A3B8" letter-spacing="1">keyness &amp; rank-turbulence</text>
</svg>
